<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>About — My DA Server</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #f4f6f9; color: #333; }

    nav {
      background: #1a1a2e;
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 60px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    nav .logo {
      color: #e94560;
      font-size: 1.3rem;
      font-weight: 700;
      letter-spacing: 1px;
    }
    nav ul { list-style: none; display: flex; gap: 2rem; }
    nav ul a {
      color: #ccc;
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 500;
      padding: 6px 0;
      border-bottom: 2px solid transparent;
      transition: color 0.2s, border-color 0.2s;
    }
    nav ul a:hover, nav ul a.active {
      color: #e94560;
      border-bottom-color: #e94560;
    }

    .content {
      max-width: 700px;
      margin: 80px auto;
      padding: 0 1rem;
    }
    .content h1 { font-size: 2rem; color: #1a1a2e; margin-bottom: 1rem; }
    .content p { font-size: 1.05rem; color: #555; line-height: 1.8; }
  </style>
</head>
<body>
  <nav>
    <span class="logo">ROMCHIK</span>
    <ul>
      <li><a href="/">Home</a></li>
      <li><a href="/about" class="active">About</a></li>
      <li><a href="/contact">Contact</a></li>
    </ul>
  </nav>

  <div class="content">
    <h1>About</h1>
    <p>This is the about page. I built this server myself!</p>
  </div>
</body>
</html>
